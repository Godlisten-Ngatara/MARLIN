# .github/workflows/release.yml
name: Generate Release Notes

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV="${{ steps.prev_tag.outputs.tag }}"

          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          # Group commits by type
          {
            echo "## What's Changed in $TAG"
            echo ""

            FEATS=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^feat:" | sed 's/^feat: //')
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS" | while read line; do echo "- $line"; done
              echo ""
            fi

            FIXES=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^fix:" | sed 's/^fix: //')
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | while read line; do echo "- $line"; done
              echo ""
            fi

            PERFS=$(git log $RANGE --pretty=format:"%s (%h)" --grep="^perf:" | sed 's/^perf: //')
            if [ -n "$PERFS" ]; then
              echo "### Performance"
              echo "$PERFS" | while read line; do echo "- $line"; done
              echo ""
            fi

            OTHERS=$(git log $RANGE -E --pretty=format:"%s (%h)" --grep="^(chore|refactor|ci|build):" | sed 's/^[a-z]*: //')
            if [ -n "$OTHERS" ]; then
              echo "### Other"
              echo "$OTHERS" | while read line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$PREV" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            else
              echo "**Full history:** https://github.com/${{ github.repository }}/commits/${TAG}"
            fi
          } > changelog.md

          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
