name: Build and Push to GHCR

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "src/**"
      - "marlin*.py"
      - "marlin_main/**"
      - "dhis2_src/**"
      - "test/**"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "src/**"
      - "marlin*.py"
      - "marlin_main/**"
      - "dhis2_src/**"
      - "test/**"

concurrency:
  group: build-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for buildx multi-arch, optional)
        uses: docker/setup-qemu-action@v2
        if: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYPI_EXTRA_INDEX_URL=${{ secrets.PYPI_EXTRA_INDEX_URL }}  # if needed
